version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: delivery_db
    ports:
      - "5433:5432"

  delivery-service:
    build: .
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://admin:1234@postgres:5432/delivery_db
      ORDER_URL: http://order-service:3001
      NOTIFICATION_URL: http://notification-service:3004
    depends_on:
      - postgres
